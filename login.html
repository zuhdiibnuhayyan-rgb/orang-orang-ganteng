<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Masuk | Monitoring IoT</title>

  <!-- FONT AWESOME -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
    }

    .login-body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .login-wrapper{
      width:100%;
      max-width:1100px;
      background:#111827;
      border-radius:30px;
      overflow:hidden;
      display:grid;
      grid-template-columns:1fr 1fr;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    /* LEFT */
    .login-card{
      padding:50px;
      background:#111827;
    }

    .login-brand{
      margin-bottom:40px;
    }

    .login-brand img{
      width:70px;
      margin-bottom:20px;
    }

    .login-brand h1{
      font-size:32px;
      margin-bottom:10px;
    }

    .login-brand p{
      color:#94a3b8;
      line-height:1.6;
    }

    /* FORM */
    .login-form{
      display:flex;
      flex-direction:column;
      gap:20px;
    }

    .form-group{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .form-group label{
      font-size:14px;
      color:#cbd5e1;
    }

    /* FIX INPUT */
    .form-group input{
      width:100%;
      padding:14px;
      border:none;
      outline:none;
      border-radius:14px;
      background:#1e293b;
      color:#f8fafc;
      font-size:15px;
    }

    .form-group input::placeholder{
      color:#94a3b8;
    }

    /* FIX AUTOFILL */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus{
      -webkit-text-fill-color:#f8fafc;
      transition:background-color 5000s ease-in-out 0s;
      box-shadow:0 0 0px 1000px #1e293b inset;
    }

    /* PASSWORD */
    .password-wrapper{
      position:relative;
    }

    .password-wrapper input{
      padding-right:50px;
    }

    .toggle-password{
      position:absolute;
      right:18px;
      top:50%;
      transform:translateY(-50%);
      cursor:pointer;
      color:#94a3b8;
      transition:0.3s;
    }

    .toggle-password:hover{
      color:#7c3aed;
    }

    /* ROW */
    .form-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:14px;
    }

    .checkbox{
      display:flex;
      align-items:center;
      gap:8px;
      color:#cbd5e1;
    }

    .checkbox input{
      accent-color:#7c3aed;
    }

    .link{
      color:#a78bfa;
      text-decoration:none;
    }

    .link:hover{
      text-decoration:underline;
    }

    /* BUTTON */
    .btn{
      border:none;
      padding:15px;
      border-radius:14px;
      cursor:pointer;
      font-size:16px;
      font-weight:bold;
      transition:0.3s;
    }

    .btn-primary{
      background:#7c3aed;
      color:white;
    }

    .btn-primary:hover{
      background:#6d28d9;
    }

    .btn-block{
      width:100%;
    }

    .form-message{
      text-align:center;
      font-size:14px;
    }

    .form-footer{
      text-align:center;
      color:#94a3b8;
      font-size:14px;
    }

    /* RIGHT */
    .login-art{
      background:linear-gradient(
        135deg,
        #7c3aed,
        #4f46e5
      );

      display:flex;
      align-items:center;
      justify-content:center;
      padding:50px;
    }

    .art-content{
      max-width:400px;
    }

    .art-content h2{
      font-size:48px;
      margin-bottom:20px;
      line-height:1.2;
    }

    .art-content p{
      line-height:1.8;
      font-size:17px;
      color:#ede9fe;
    }

    /* RESPONSIVE */
    @media(max-width:900px){

      .login-wrapper{
        grid-template-columns:1fr;
      }

      .login-art{
        display:none;
      }

      .login-card{
        padding:35px;
      }

    }
  </style>
</head>

<body class="login-body">

  <div class="login-wrapper">

    <!-- LOGIN -->
    <div class="login-card">

      <div class="login-brand">

        <img src="img/logo.png" alt="Logo">

        <h1>Selamat Datang Kembali</h1>

        <p>
          Masuk untuk mengakses dashboard monitoring Anda
        </p>

      </div>

      <!-- FORM -->
      <form id="loginForm" class="login-form">

        <!-- EMAIL -->
        <div class="form-group">

          <label for="email">
            Email
          </label>

          <input
            type="email"
            id="email"
            placeholder="nama@email.com"
            required
          />

        </div>

        <!-- PASSWORD -->
        <div class="form-group">

          <label for="password">
            Password
          </label>

          <div class="password-wrapper">

            <input
              type="password"
              id="password"
              placeholder="••••••••"
              required
            />

            <i
              class="fa-solid fa-eye toggle-password"
              id="togglePassword">
            </i>

          </div>

        </div>

        <!-- OPTIONS -->
        <div class="form-row">

          <label class="checkbox">

            <input type="checkbox" />

            Ingat saya

          </label>

          <a href="#" class="link">
            Lupa password?
          </a>

        </div>

        <!-- BUTTON -->
        <button
          type="submit"
          class="btn btn-primary btn-block">

          Masuk

        </button>

        <p id="loginMessage" class="form-message"></p>

        <p class="form-footer">

          Belum punya akun?

          <a href="#" class="link">
            Daftar di sini
          </a>

        </p>

      </form>

    </div>

    <!-- RIGHT SIDE -->
    <div class="login-art">

      <div class="art-content">

        <h2>
          Monitoring <br>
          Lebih Cerdas
        </h2>

        <p>
          Pantau seluruh sensor IoT Anda
          dalam satu dashboard yang elegan
          dan modern.
        </p>

      </div>

    </div>

  </div>

  <!-- SHOW PASSWORD -->
  <script>
    const togglePassword =
      document.getElementById("togglePassword");

    const password =
      document.getElementById("password");

    togglePassword.addEventListener("click", () => {

      const type =
        password.getAttribute("type") === "password"
        ? "text"
        : "password";

      password.setAttribute("type", type);

      togglePassword.classList.toggle("fa-eye");
      togglePassword.classList.toggle("fa-eye-slash");

    });
  </script>

  <!-- LOGIN -->
  <script>
    const loginForm =
      document.getElementById("loginForm");

    const loginMessage =
      document.getElementById("loginMessage");

    loginForm.addEventListener("submit", function(e){

      e.preventDefault();

      const email =
        document.getElementById("email").value;

      const password =
        document.getElementById("password").value;

      if(email && password){

        loginMessage.style.color = "#22c55e";

        loginMessage.textContent =
          "Login berhasil...";

        setTimeout(() => {

          window.location.href =
            "dashboard.html";

        }, 1000);

      } else {

        loginMessage.style.color = "#ef4444";

        loginMessage.textContent =
          "Email dan password wajib diisi!";

      }

    });
  </script>

</body>
</html>
