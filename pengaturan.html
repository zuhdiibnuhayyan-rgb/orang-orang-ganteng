<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Pengaturan | Monitoring IoT</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
    }

    .app-shell{
      display:flex;
      min-height:100vh;
    }

    /* SIDEBAR */
    .sidebar{
      width:250px;
      background:#111827;
      padding:20px;
    }

    .sidebar-brand{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:30px;
      font-size:20px;
      font-weight:bold;
    }

    .sidebar-brand img{
      width:40px;
    }

    .sidebar-nav{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .sidebar-nav a{
      text-decoration:none;
      color:#cbd5e1;
      padding:12px;
      border-radius:10px;
      transition:0.3s;
    }

    .sidebar-nav a:hover,
    .sidebar-nav .active{
      background:#7c3aed;
      color:white;
    }

    /* MAIN */
    .main{
      flex:1;
      padding:30px;
    }

    .page-title{
      margin-bottom:30px;
    }

    .page-title p{
      color:#94a3b8;
      margin-top:10px;
    }

    /* SETTINGS */
    .settings-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      gap:20px;
    }

    .setting-card{
      background:#1e293b;
      padding:25px;
      border-radius:20px;
    }

    .setting-card h3{
      margin-bottom:20px;
    }

    .form-group{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-bottom:20px;
    }

    .form-group label{
      color:#cbd5e1;
      font-size:14px;
    }

    .form-group input,
    .form-group select{
      padding:14px;
      border:none;
      outline:none;
      border-radius:12px;
      background:#0f172a;
      color:white;
    }

    .save-btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:#7c3aed;
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    .save-btn:hover{
      background:#6d28d9;
    }

    .switch{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
      background:#0f172a;
      padding:15px;
      border-radius:12px;
    }

    .switch input{
      width:20px;
      height:20px;
      accent-color:#7c3aed;
    }

    /* RESPONSIVE */
    @media(max-width:900px){

      .sidebar{
        display:none;
      }

      .main{
        padding:20px;
      }

    }
  </style>
</head>

<body>

<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="sidebar-brand">
      <img src="img/logo.png" alt="Logo">
      <span>Monitoring<strong>IoT</strong></span>
    </div>

    <nav class="sidebar-nav">

      <a href="dashboard.html">
        📊 Dashboard
      </a>

      <a href="sensor.html">
        🌡 Sensor
      </a>

      <a href="riwayat.html">
        📈 Riwayat
      </a>

      <a href="pengaturan.html" class="active">
        ⚙ Pengaturan
      </a>

    </nav>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <div class="page-title">

      <h1>Pengaturan</h1>

      <p>
        Kelola akun dan preferensi dashboard Anda
      </p>

    </div>

    <div class="settings-grid">

      <!-- PROFILE -->
      <div class="setting-card">

        <h3>Profil Pengguna</h3>

        <div class="form-group">
          <label>Nama</label>
          <input type="text" value="User IoT">
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" value="user@email.com">
        </div>

        <button class="save-btn">
          Simpan Perubahan
        </button>

      </div>

      <!-- SYSTEM -->
      <div class="setting-card">

        <h3>Pengaturan Sistem</h3>

        <div class="switch">
          <span>Notifikasi Sensor</span>
          <input type="checkbox" checked>
        </div>

        <div class="switch">
          <span>Mode Gelap</span>
          <input type="checkbox" checked>
        </div>

        <div class="form-group">
          <label>Bahasa</label>

          <select>
            <option>Indonesia</option>
            <option>English</option>
          </select>
        </div>

        <button class="save-btn">
          Terapkan Pengaturan
        </button>

      </div>

    </div>

  </main>

</div>

</body>
</html>
